<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css">
  <title>Perfect Circles</title>
</head>

<body>

  <div id="menu">

    <div id="menuCard">

      <div class="title">
        ⭕ PERFECT CIRCLES
      </div>

      <div class="subtitle">
        A minimalist tower defense survival system
      </div>

      <div class="menuStats">
        <div>Survive endless waves</div>
        <div>Upgrade your circle tower</div>
        <div>Fight bosses every 5 waves</div>
      </div>

      <button id="playBtn" class="menuBtn play">
        ▶ START SIMULATION
      </button>

      <button id="resetBtn" class="menuBtn danger">
        🗑 RESET SAVE
      </button>

      <div class="smallHint">
        Tip: Higher waves = faster enemies + stronger bosses
      </div>

    </div>

  </div>

  <div id="ui">

    <div class="panel">

      <h2>🏰 CORE</h2>

      <div class="stat">
        Gold: <span id="gold">0</span>
      </div>

      <div class="stat">
        Crystals: <span id="crystals">0</span>
      </div>

      <div class="stat">
        Wave: <span id="wave">1</span>
      </div>

      <div class="stat">
        Kills: <span id="kills">0</span>
      </div>

      <div class="stat">
        DPS: <span id="dps">0</span>
      </div>

      <div class="stat">
        Lives: <span id="lives">20</span>
      </div>

    </div>

    <div class="panel">

      <h2>⬆ UPGRADES</h2>

      <button id="damageBtn"></button>
      <button id="speedBtn"></button>
      <button id="rangeBtn"></button>
      <button id="freezeBtn"></button>
      <button id="multiBtn"></button>
      <button id="flameBtn"></button>
      <button id="assistantBtn"></button>

    </div>

    <div class="panel">

      <h2>⚡ CONTROL</h2>

      <button id="waveBtn">
        ▶ START WAVE
      </button>

      <button id="speedToggle">
        ⏩ SPEED x1
      </button>

      <button id="autoBtn">
        AUTO WAVE: ON
      </button>

      <button id="prestigeBtn">
        ✨ PRESTIGE
      </button>

    </div>

  </div>
  <div id="vignette"></div>
  <canvas id="game"></canvas>

  <script src="perfect-circle.js"></script>
</body>

</html>

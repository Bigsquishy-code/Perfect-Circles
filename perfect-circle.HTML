<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />

  <title>Perfect Circles</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family:
        Inter,
        Arial,
        sans-serif;

      background:
        radial-gradient(circle at top,
          #1e3a8a 0%,
          #0f172a 35%,
          #020617 100%);

      color: white;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      /* changed from left → right */
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 95vh;
      overflow-y: auto;
      /* allows scrolling if screen is small */
    }

    #ui {
      animation: uiSlide 0.8s ease;
    }

    @keyframes uiSlide {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .panel {
      width: 290px;

      background:
        linear-gradient(180deg,
          rgba(15, 23, 42, 0.82),
          rgba(2, 6, 23, 0.92));

      border:
        1px solid rgba(147, 197, 253, 0.12);

      border-radius: 22px;

      backdrop-filter: blur(18px);

      padding: 16px;

      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);

      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease;
    }

    .panel:hover {
      transform: translateY(-4px);

      box-shadow:
        0 16px 50px rgba(37, 99, 235, 0.18);
    }

    h2 {
      margin: 0 0 12px 0;
      color: #93c5fd;
    }

    button {
      width: 100%;

      padding: 13px 16px;

      margin-top: 10px;

      border: 1px solid rgba(255, 255, 255, 0.08);

      border-radius: 14px;

      background:
        linear-gradient(180deg,
          #2563eb,
          #1d4ed8);

      color: white;

      font-size: 14px;
      font-weight: 600;

      cursor: pointer;

      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        background 0.18s ease;

      box-shadow:
        0 6px 20px rgba(37, 99, 235, 0.28);
    }

    button:hover {
      transform: translateY(-2px);

      background:
        linear-gradient(180deg,
          #3b82f6,
          #2563eb);

      box-shadow:
        0 10px 28px rgba(59, 130, 246, 0.42);
    }

    button:active {
      transform: scale(0.97);
    }

    .fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #4ade80);
    }

    #menu {

      position: absolute;
      inset: 0;

      display: flex;
      justify-content: center;
      align-items: center;

      background:
        radial-gradient(circle at top, #1e293b, #020617);

      z-index: 100;
    }

    #menuCard {

      width: 360px;

      background: rgba(15, 23, 42, 0.85);

      border: 1px solid rgba(255, 255, 255, 0.08);

      padding: 30px;

      border-radius: 22px;

      text-align: center;
    }

    #menu h1 {
      font-size: 42px;
      color: #93c5fd;
    }

    .small {
      opacity: 0.7;
      font-size: 14px;
    }

    #vignette {
      position: absolute;
      inset: 0;

      pointer-events: none;

      background:
        radial-gradient(circle,
          transparent 40%,
          rgba(0, 0, 0, 0.45) 100%);

      z-index: 1;
    }

    /* ================= PERFECT CIRCLES MENU ================= */

    #menuCard {
      width: 380px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(147, 197, 253, 0.15);
      padding: 28px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 0 40px rgba(37, 99, 235, 0.15);
      animation: floatIn 0.6s ease;
    }

    .title {
      font-size: 44px;
      font-weight: 800;

      background:
        linear-gradient(90deg,
          #60a5fa,
          #c084fc,
          #22d3ee);

      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      letter-spacing: 1px;

      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 18px;
    }

    .menuStats {
      font-size: 13px;
      opacity: 0.85;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .menuBtn {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s;
    }

    .menuBtn.play {
      background: linear-gradient(90deg, #2563eb, #3b82f6);
      color: white;
      font-weight: bold;
    }

    .menuBtn.play:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
    }

    .menuBtn.danger {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .menuBtn.danger:hover {
      background: rgba(239, 68, 68, 0.25);
    }

    .smallHint {
      margin-top: 14px;
      font-size: 12px;
      opacity: 0.5;
    }

    /* animation */
    @keyframes floatIn {
      from {
        transform: scale(0.9);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <div id="menu">

    <div id="menuCard">

      <div class="title">
        ⭕ PERFECT CIRCLES
      </div>

      <div class="subtitle">
        A minimalist tower defense survival system
      </div>

      <div class="menuStats">
        <div>Survive endless waves</div>
        <div>Upgrade your circle tower</div>
        <div>Fight bosses every 5 waves</div>
      </div>

      <button id="playBtn" class="menuBtn play">
        ▶ START SIMULATION
      </button>

      <button id="resetBtn" class="menuBtn danger">
        🗑 RESET SAVE
      </button>

      <div class="smallHint">
        Tip: Higher waves = faster enemies + stronger bosses
      </div>

    </div>

  </div>

  <div id="ui">

    <div class="panel">

      <h2>🏰 CORE</h2>

      <div class="stat">
        Gold: <span id="gold">0</span>
      </div>

      <div class="stat">
        Crystals: <span id="crystals">0</span>
      </div>

      <div class="stat">
        Wave: <span id="wave">1</span>
      </div>

      <div class="stat">
        Kills: <span id="kills">0</span>
      </div>

      <div class="stat">
        DPS: <span id="dps">0</span>
      </div>

      <div class="stat">
        Lives: <span id="lives">20</span>
      </div>

    </div>

    <div class="panel">

      <h2>⬆ UPGRADES</h2>

      <button id="damageBtn"></button>
      <button id="speedBtn"></button>
      <button id="rangeBtn"></button>
      <button id="freezeBtn"></button>
      <button id="multiBtn"></button>
      <button id="flameBtn"></button>
      <button id="assistantBtn"></button>

    </div>

    <div class="panel">

      <h2>⚡ CONTROL</h2>

      <button id="waveBtn">
        ▶ START WAVE
      </button>

      <button id="speedToggle">
        ⏩ SPEED x1
      </button>

      <button id="autoBtn">
        AUTO WAVE: ON
      </button>

      <button id="prestigeBtn">
        ✨ PRESTIGE
      </button>

    </div>

  </div>
  <div id="vignette"></div>
  <canvas id="game"></canvas>

  <script>

    /* ================= UI ELEMENTS ================= */

    const goldEl = document.getElementById("gold");
    const crystalsEl = document.getElementById("crystals");
    const waveEl = document.getElementById("wave");
    const killsEl = document.getElementById("kills");
    const dpsEl = document.getElementById("dps");
    const livesEl = document.getElementById("lives");

    const damageBtn = document.getElementById("damageBtn");
    const speedBtn = document.getElementById("speedBtn");
    const rangeBtn = document.getElementById("rangeBtn");
    const freezeBtn = document.getElementById("freezeBtn");
    const multiBtn = document.getElementById("multiBtn");
    const flameBtn = document.getElementById("flameBtn");
    const assistantBtn = document.getElementById("assistantBtn");

    const waveBtn = document.getElementById("waveBtn");
    const autoBtn = document.getElementById("autoBtn");
    const speedToggle = document.getElementById("speedToggle");
    const prestigeBtn = document.getElementById("prestigeBtn");

    const playBtn = document.getElementById("playBtn");
    const resetBtn = document.getElementById("resetBtn");
    const menu = document.getElementById("menu");


    /* ================= CANVAS ================= */

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    function resize() {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
      tower.x = canvas.width / 2;
      tower.y = canvas.height / 2;
    }
    addEventListener("resize", resize);

    /* ================= MENU ================= */

    let started = false;
    playBtn.onclick = async () => {

      started = true;
      menu.style.display = "none";

      // 🎧 UNLOCK AUDIO SYSTEM (THIS IS THE MISSING PIECE)
      if (audioCtx.state === "suspended") {
        await audioCtx.resume();
      }

      startMusic();
    };

    resetBtn.onclick = () => {

      localStorage.removeItem("perfect_tower_save");
      location.reload();
    };

    /* ================= SAVE ================= */

    const save =
      JSON.parse(
        localStorage.getItem(
          "perfect_tower_save"
        )
      ) || {};

    /* ================= GAME ================= */

    let gold = save.gold || 150;

    let crystals = save.crystals || 0;

    let wave = save.wave || 1;

    let kills = save.kills || 0;

    let lives = save.lives || 20;

    let autoWave = false;

    let gameSpeed = 1;

    let waveInProgress = false;

    let damageDone = 0;

    let enemies = [];
    let bullets = [];
    let particles = [];
    let texts = [];
    let turrets = [];

    let screenShake = 0;

    /* ================= STARS ================= */

    const stars = [];

    for (let i = 0; i < 140; i++) {

      stars.push({

        x: Math.random() * innerWidth,
        y: Math.random() * innerHeight,
        size: Math.random() * 2
      });
    }

    /* ================= TOWER ================= */

    const tower = {

      x: 0,
      y: 0,

      angle: 0,

      damage: save.damage || 18,

      fireRate: save.fireRate || 30,

      range: save.range || 240,

      crit: 0.15 + crystals * 0.005,

      freeze: save.freeze || 0,

      flameLevel: save.flameLevel || 0,

      flameRadius: 0,

      multiShot: save.multiShot || 1,

      /* assistant tower */

      assistantLevel: save.assistantLevel || 0,
      assistantCooldown: 0,

      cooldown: 0
    };

    resize();

    /* ================= SAVE ================= */

    function saveGame() {

      localStorage.setItem(

        "perfect_tower_save",

        JSON.stringify({

          gold,
          crystals,
          wave,
          kills,
          lives,

          damage: tower.damage,
          fireRate: tower.fireRate,
          range: tower.range,
          freeze: tower.freeze,
          flameLevel: tower.flameLevel,
          multiShot: tower.multiShot,
          assistantLevel: tower.assistantLevel
        })
      );
    }

    setInterval(saveGame, 3000);
    /* ================= SOUND SYSTEM ================= */

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      let freq = 440;
      let duration = 0.1;

      switch (type) {
        case "shoot": freq = 600; duration = 0.05; break;
        case "flame": freq = 250; duration = 0.01; break;
        case "hit": freq = 200; duration = 0.08; break;
        case "kill": freq = 120; duration = 0.15; break;
        case "upgrade": freq = 800; duration = 0.1; break;
        case "wave": freq = 300; duration = 0.2; break;
        case "damageCrit": freq = 1000; duration = 0.07; break;
        case "gameOver": freq = 80; duration = 0.5; break;
      }

      osc.frequency.value = freq;
      osc.type = "square";

      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    /* ================= BACKGROUND MUSIC ================= */

    let music = null;
    let musicStarted = false;

    function startMusic() {

      if (musicStarted) return;

      music = new Audio("./the_red_pl.mp3");
      // OR just "the_red_pl.mp3" also works

      music.loop = true;
      music.volume = 0.35;

      music.play()
        .then(() => {
          musicStarted = true;
        })
        .catch((err) => {
          console.log("Music blocked until user interaction:", err);
          musicStarted = false;
        });
    }
    /* ================= HELPERS ================= */

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }
    /* ================= DAMAGE TEXT ================= */
    class DamageText {
      constructor(x, y, text, color) {
        this.x = x;
        this.y = y;
        this.text = text;
        this.color = color;
        this.life = 40;
      }

      update() {
        this.y -= 0.7;
        this.life--;
      }

      draw() {
        ctx.globalAlpha = this.life / 40;
        ctx.fillStyle = this.color;
        ctx.font = "bold 18px Arial";
        ctx.fillText(this.text, this.x, this.y);
        ctx.globalAlpha = 1;
      }
    }

    /* ================= PARTICLES ================= */

    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = random(-2, 2);
        this.vy = random(-2, 2);
        this.life = 25;
        this.color = color;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
      }

      draw() {
        ctx.globalAlpha = this.life / 25;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
    /* ================= ENEMY ================= */

    class Enemy {

      constructor(type = "normal") {

        this.type = type;

        const side =
          Math.floor(Math.random() * 4);

        if (side === 0) {

          this.x = -60;
          this.y = random(0, canvas.height);
        }

        if (side === 1) {

          this.x = canvas.width + 60;
          this.y = random(0, canvas.height);
        }

        if (side === 2) {

          this.x = random(0, canvas.width);
          this.y = -60;
        }

        if (side === 3) {

          this.x = random(0, canvas.width);
          this.y = canvas.height + 60;
        }

        this.freeze = 0;

        this.dead = false;

        if (type === "normal") {

          this.radius = 16;
          this.health = 60 + wave * 20;
          this.speed = 1 + wave * 0.04;
          this.color = "#ef4444";
          this.reward = 15;
        }

        if (type === "fast") {

          this.radius = 11;
          this.health = 40 + wave * 10;
          this.speed = 2.8 + wave * 0.03;
          this.color = "#22c55e";
          this.reward = 18;
        }

        if (type === "tank") {

          this.radius = 28;
          this.health = 300 + wave * 80;
          this.speed = 0.7;
          this.color = "#f59e0b";
          this.reward = 40;
        }

        if (type === "boss") {

          this.radius = 40;
          this.health = 1200 + wave * 250;
          this.speed = 0.9;
          this.color = "#a855f7";
          this.reward = 300;
        }

        this.maxHealth = this.health;
      }

      update() {

        const dx =
          tower.x - this.x;

        const dy =
          tower.y - this.y;

        const d =
          Math.hypot(dx, dy);

        if (d === 0) return;

        let speedMult = 1;

        if (this.freeze > 0) {

          this.freeze--;

          speedMult = 0.45;
        }

        this.x +=
          dx / d * this.speed * speedMult * gameSpeed;

        this.y +=
          dy / d * this.speed * speedMult * gameSpeed;

        if (this.type === "boss") {

          if (Math.random() < 0.004) {

            tower.cooldown += 30;
            screenShake = 10;
          }
        }

        if (d < 42) {

          this.dead = true;

          lives--;

          screenShake = 8;

          if (lives <= 0) {

            gameOver();
          }
        }
      }

      draw() {

        ctx.save();

        ctx.fillStyle = this.color;

        ctx.shadowBlur = 25;
        ctx.shadowColor = this.color;

        ctx.beginPath();

        ctx.arc(
          this.x,
          this.y,
          this.radius,
          0,
          Math.PI * 2
        );

        ctx.fill();

        ctx.restore();

        ctx.fillStyle = "#111827";

        ctx.fillRect(
          this.x - 30,
          this.y - 40,
          60,
          8
        );

        ctx.fillStyle = "#22c55e";

        ctx.fillRect(
          this.x - 30,
          this.y - 40,
          60 * (this.health / this.maxHealth),
          8
        );
      }
    }

    /* ================= BULLET ================= */

    class Bullet {

      constructor(target) {

        this.x = tower.x;
        this.y = tower.y;

        this.target = target;

        this.speed = tower.fireRate > 20 ? 10 : 14;

        this.dead = false;
      }

      update() {

        if (!this.target || this.target.dead) {

          this.dead = true;
          return;
        }

        const dx =
          this.target.x - this.x;

        const dy =
          this.target.y - this.y;

        const d =
          Math.hypot(dx, dy);

        if (d === 0) return;

        this.x +=
          dx / d * this.speed;

        this.y +=
          dy / d * this.speed;

        if (d < 10) {
          playSound("hit");
          let dmg = tower.damage;

          let crit = false;

          if (Math.random() < tower.crit) {
            playSound("damageCrit");
            dmg *= 3;
            crit = true;
          }

          this.target.health -= dmg;

          damageDone += dmg;

          this.target.freeze =
            tower.freeze;

          texts.push(

            new DamageText(

              this.x,
              this.y,

              Math.floor(dmg),

              crit
                ? "#facc15"
                : "#ffffff"
            )
          );

          if (particles.length < 700) {

            for (let i = 0; i < 10; i++) {

              particles.push(

                new Particle(

                  this.x,
                  this.y,

                  crit
                    ? "#facc15"
                    : "#ffffff",

                  random(2, 5)
                )
              );
            }
          }

          if (crit) {

            enemies.forEach(e => {

              if (
                e !== this.target &&
                dist(e, this.target) < 130
              ) {

                e.health -=
                  tower.damage * 0.5;
              }
            });
          }

          if (this.target.health <= 0) {
            playSound("kill");
            this.target.dead = true;

            gold += this.target.reward;

            kills++;

            screenShake = 6;

            for (let i = 0; i < 25; i++) {

              particles.push(

                new Particle(

                  this.target.x,
                  this.target.y,

                  this.target.color,

                  random(3, 7)
                )
              );
            }
          }

          this.dead = true;
        }
      }

      draw() {

        ctx.fillStyle = "#facc15";

        ctx.shadowBlur = 15;
        ctx.shadowColor = "#fde047";

        ctx.beginPath();

        ctx.arc(
          this.x,
          this.y,
          5,
          0,
          Math.PI * 2
        );

        ctx.fill();

        ctx.shadowBlur = 0;
      }
    }

    /* ================= TARGET ================= */

    function getTarget() {

      let best = null;
      let bestDist = Infinity;

      for (const e of enemies) {

        const d = dist(e, tower);

        if (
          d < tower.range &&
          d < bestDist
        ) {

          best = e;
          bestDist = d;
        }
      }

      return best;
    }

    /* ================= WAVES ================= */

    function spawnWave() {

      if (waveInProgress) return;

      waveInProgress = true;

      let amount = 5 + Math.floor(wave * 1.2);

      if (wave % 7 === 0) {

        enemies.push(
          new Enemy("boss")
        );
      }

      for (let i = 0; i < amount; i++) {

        setTimeout(() => {

          const r = Math.random();

          if (r < 0.6) {

            enemies.push(
              new Enemy("normal")
            );
          }

          else if (r < 0.85) {

            enemies.push(
              new Enemy("fast")
            );
          }

          else {

            enemies.push(
              new Enemy("tank")
            );
          }

        }, i * 250);
      }

      wave++;
      texts.push(
        new DamageText(
          canvas.width / 2 - 80,
          120,
          `WAVE ${wave}`,
          "#60a5fa"
        )
      );
    }

    /* ================= PRESTIGE ================= */

    function prestige() {

      if (wave < 25) return;

      const gain =
        Math.floor(wave / 10);

      crystals += gain;

      gold = 150;
      wave = 1;
      kills = 0;
      lives = 20;

      enemies = [];
      bullets = [];

      tower.damage = 18 + crystals * 2;
      tower.fireRate = 3;
      tower.range = 240;
      tower.freeze = 0;
      tower.flame = false;
      tower.multiShot = 1;

      alert(
        "Prestiged for "
        + gain +
        " crystals!"
      );
    }

    /* ================= GAME OVER ================= */

    function gameOver() {

      alert("GAME OVER");

      localStorage.removeItem(
        "perfect_tower_save"
      );

      location.reload();
    }

    /* ================= UPDATE ================= */

    function update() {

      if (!started) return;

      if (autoWave && !waveInProgress) {

        spawnWave();
      }

      tower.cooldown -= gameSpeed;

      const target =
        getTarget();

      if (target) {

        tower.angle =
          Math.atan2(
            target.y - tower.y,
            target.x - tower.x
          );

        if (tower.cooldown <= 0) {
          tower.cooldown = tower.fireRate;
          playSound("flame");

          if (tower.flameLevel > 0) {

            tower.flameRadius = tower.flameLevel * 35;
            const burnDamage =
              tower.damage * (0.05 + tower.flameLevel * 0.02);

            target.health -= burnDamage;

            damageDone += burnDamage;

            particles.push(
              new Particle(
                target.x + random(-20, 20),
                target.y + random(-20, 20),
                "#f97316",
                random(2, 5)
              )
            );
          }

          else {

            for (
              let i = 0;
              i < tower.multiShot;
              i++
            ) {

              bullets.push(
                new Bullet(target)
              );
            }
          }

          /* ================= ASSISTANT AI ================= */

          if (tower.assistantLevel > 0) {

            tower.assistantCooldown -= gameSpeed;

            if (tower.assistantCooldown <= 0) {

              const nearbyEnemies =
                enemies.filter(
                  e => dist(e, tower) < tower.range * 0.9
                );

              if (nearbyEnemies.length > 0) {

                const enemy =
                  nearbyEnemies[
                  Math.floor(
                    Math.random() * nearbyEnemies.length
                  )
                  ];

                bullets.push({

                  x: tower.x,
                  y: tower.y,

                  target: enemy,

                  speed: 13,

                  dead: false,

                  assistant: true,

                  update() {

                    if (!this.target || this.target.dead) {

                      this.dead = true;
                      return;
                    }

                    const dx =
                      this.target.x - this.x;

                    const dy =
                      this.target.y - this.y;

                    const d =
                      Math.hypot(dx, dy);

                    if (d === 0) return;

                    this.x +=
                      dx / d * this.speed * gameSpeed;

                    this.y +=
                      dy / d * this.speed * gameSpeed;

                    if (d < 12) {

                      const dmg =
                        tower.damage *
                        (0.45 + tower.assistantLevel * 0.15);

                      this.target.health -= dmg;

                      damageDone += dmg;

                      texts.push(
                        new DamageText(
                          this.x,
                          this.y,
                          Math.floor(dmg),
                          "#60a5fa"
                        )
                      );

                      for (let i = 0; i < 8; i++) {

                        particles.push(
                          new Particle(
                            this.x,
                            this.y,
                            "#60a5fa"
                          )
                        );
                      }

                      if (this.target.health <= 0) {

                        this.target.dead = true;

                        gold += this.target.reward;

                        kills++;

                        playSound("kill");
                      }

                      this.dead = true;
                    }
                  },

                  draw() {

                    ctx.fillStyle = "#60a5fa";

                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "#60a5fa";

                    ctx.beginPath();

                    ctx.arc(
                      this.x,
                      this.y,
                      4,
                      0,
                      Math.PI * 2
                    );

                    ctx.fill();

                    ctx.shadowBlur = 0;
                  }
                });

                tower.assistantCooldown =
                  Math.max(
                    22 - tower.assistantLevel * 2,
                    6
                  );
              }
            }
          }
        }
      }

      enemies.forEach(
        e => e.update()
      );
      bullets.forEach(b => {

        if (b.update) {
          b.update();
        }
      });

      particles.forEach(
        p => p.update()
      );

      texts.forEach(
        t => t.update()
      );

      enemies =
        enemies.filter(e => !e.dead);

      bullets =
        bullets.filter(b => !b.dead);

      particles =
        particles.filter(p => p.life > 0);

      texts =
        texts.filter(t => t.life > 0);

      if (
        waveInProgress &&
        enemies.length === 0
      ) {

        waveInProgress = false;
      }

      gold += 0.08 * gameSpeed;

      updateUI();
    }

    /* ================= UI ================= */

    function updateUI() {

      goldEl.textContent =
        Math.floor(gold);

      crystalsEl.textContent =
        crystals;

      waveEl.textContent =
        wave;

      killsEl.textContent =
        kills;

      livesEl.textContent =
        lives;

      dpsEl.textContent =
        Math.floor(damageDone);

      damageBtn.textContent =
        `Damage +6 (${damageCost()})`;

      speedBtn.textContent =
        `Fire Speed (${speedCost()})`;

      rangeBtn.textContent =
        `Range +25 (${rangeCost()})`;

      freezeBtn.textContent =
        `❄ Freeze (${freezeCost()})`;

      multiBtn.textContent =
        `🔫 Multi Shot (${multiCost()})`;

      flameBtn.textContent =
        `🔥 Flamethrower (${flameCost()})`;

      assistantBtn.textContent =
        `🤖 Assistant Tower (${assistantCost()})`;

    }

    /* ================= COSTS ================= */

    function damageCost() {

      return Math.floor(
        30 * Math.pow(
          1.18,
          tower.damage / 6
        )
      );
    }

    function speedCost() {

      return Math.floor(
        45 * Math.pow(
          1.16,
          20 - tower.fireRate
        )
      );
    }

    function rangeCost() {

      return Math.floor(
        60 * Math.pow(
          1.15,
          (tower.range - 240) / 25
        )
      );
    }

    function freezeCost() {

      return Math.floor(
        90 * Math.pow(
          1.18,
          tower.freeze / 15
        )
      );
    }

    function multiCost() {

      return Math.floor(
        140 * Math.pow(
          1.35,
          tower.multiShot
        )
      );
    }

    function flameCost() {

      return Math.floor(
        180 * Math.pow(
          1.28,
          tower.flameLevel
        )
      );
    }

    function assistantCost() {

      return Math.floor(
        220 * Math.pow(
          1.42,
          tower.assistantLevel
        )
      );
    }

    /* ================= DRAW ================= */

    function drawBackground() {

      const grad =
        ctx.createLinearGradient(
          0,
          0,
          0,
          canvas.height
        );

      grad.addColorStop(
        0,
        "#0f172a"
      );

      grad.addColorStop(
        1,
        "#020617"
      );

      ctx.fillStyle = grad;

      ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
      );

      stars.forEach(s => {

        s.y += 0.2 * gameSpeed;

        if (s.y > canvas.height) {

          s.y = 0;
        }

        ctx.fillStyle =
          "rgba(255,255,255,0.18)";

        ctx.fillRect(
          s.x,
          s.y,
          s.size,
          s.size
        );
      });
    }

    function drawTower() {

      ctx.save();
      const pulse =
        Math.sin(Date.now() * 0.004) * 4;

      ctx.fillStyle =
        tower.flameLevel > 0
          ? "#f97316"
          : "#3b82f6";

      ctx.shadowBlur = 45;

      ctx.shadowColor =
        tower.flameLevel > 0
          ? "#fb923c"
          : "#60a5fa";

      ctx.beginPath();

      ctx.arc(
        0,
        0,
        32 + pulse,
        0,
        Math.PI * 2
      );

      ctx.fill();
      ctx.translate(
        tower.x,
        tower.y
      );

      ctx.rotate(
        tower.angle
      );

      ctx.beginPath();

      ctx.arc(
        0,
        0,
        tower.range,
        0,
        Math.PI * 2
      );

      ctx.strokeStyle =
        "rgba(255,255,255,0.08)";

      ctx.stroke();

      ctx.fillStyle =
        tower.flameLevel > 0 ? "#f97316" : "#2563eb";

      ctx.shadowBlur = 30;

      ctx.shadowColor =
        tower.flameLevel > 0 ? "#f97316" : "#2563eb";
      ctx.beginPath();

      ctx.arc(
        0,
        0,
        32,
        0,
        Math.PI * 2
      );

      ctx.fill();

      ctx.fillStyle =
        tower.flame
          ? "#fdba74"
          : "#93c5fd";
      ctx.fillRect(
        0,
        -7,
        46,
        14
      );

      /* ================= ASSISTANT DRONES ================= */

      if (tower.assistantLevel > 0) {

        const orbit =
          Date.now() * 0.002;

        const droneCount =
          Math.min(tower.assistantLevel, 4);

        for (let i = 0; i < droneCount; i++) {

          const angle =
            orbit + (Math.PI * 2 / droneCount) * i;

          const dx =
            Math.cos(angle) * 70;

          const dy =
            Math.sin(angle) * 70;

          ctx.fillStyle = "#60a5fa";

          ctx.shadowBlur = 20;
          ctx.shadowColor = "#60a5fa";

          ctx.beginPath();

          ctx.arc(
            dx,
            dy,
            10,
            0,
            Math.PI * 2
          );

          ctx.fill();

          /* little laser line */

          ctx.strokeStyle =
            "rgba(96,165,250,0.25)";

          ctx.beginPath();

          ctx.moveTo(0, 0);

          ctx.lineTo(dx, dy);

          ctx.stroke();
        }
      }

      ctx.restore();

      ctx.restore();
    }

    function draw() {

      drawBackground();

      if (!started) return;

      ctx.save();

      ctx.translate(

        random(-screenShake, screenShake) * 0.5,

        random(-screenShake, screenShake) * 0.5
      );

      screenShake *= 0.85;

      drawTower();

      enemies.forEach(
        e => e.draw()
      );

      bullets.forEach(b => {

        if (b.draw) {
          b.draw();
        }
      });

      particles.forEach(
        p => p.draw()
      );

      texts.forEach(
        t => t.draw()
      );

      ctx.restore();
      ctx.strokeStyle =
        "rgba(255,255,255,0.03)";

      ctx.lineWidth = 1;

      for (let x = 0; x < canvas.width; x += 60) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }

      for (let y = 0; y < canvas.height; y += 60) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }

    /* ================= LOOP ================= */

    function loop() {

      update();
      draw();

      requestAnimationFrame(loop);
    }

    loop();

    /* ================= BUTTONS ================= */

    waveBtn.onclick =
      spawnWave;
    screenShake = 15;

    particles.push(
      ...Array.from({ length: 80 }, () =>
        new Particle(
          tower.x,
          tower.y,
          "#60a5fa"
        )
      )
    );
    autoBtn.onclick = () => {

      autoWave = !autoWave;

      autoBtn.textContent =
        autoWave
          ? "AUTO WAVE: OFF"
          : "AUTO WAVE: ON";
    };

    speedToggle.onclick = () => {

      if (gameSpeed === 1) {

        gameSpeed = 2;
      }

      else if (gameSpeed === 2) {

        gameSpeed = 4;
      }

      else {

        gameSpeed = 1;
      }

      speedToggle.textContent =
        `⏩ SPEED x${gameSpeed}`;
    };

    prestigeBtn.onclick =
      prestige;

    /* damage */

    damageBtn.onclick = () => {

      const cost =
        damageCost();

      if (gold >= cost) {

        gold -= cost;

        tower.damage += 6;

        playSound("upgrade"); // ✅ ONLY HERE
      }
    };

    /* speed */

    speedBtn.onclick = () => {

      const cost =
        speedCost();

      if (gold >= cost) {

        gold -= cost;

        playSound("upgrade"); // ✅ ONLY HERE

        tower.fireRate =
          Math.max(
            4,
            tower.fireRate - 1
          );
      }
    };

    /* range */

    rangeBtn.onclick = () => {

      const cost =
        rangeCost();

      if (gold >= cost) {

        gold -= cost;

        tower.range += 25;
        playSound("upgrade"); // ✅ ONLY HERE
      }
    };

    /* freeze */

    freezeBtn.onclick = () => {

      const cost =
        freezeCost();

      if (gold >= cost) {

        gold -= cost;
        playSound("upgrade"); // ✅ ONLY HERE
        tower.freeze =
          Math.min(
            tower.freeze + 15,
            120
          );
      }
    };

    /* multishot */

    multiBtn.onclick = () => {

      const cost =
        multiCost();

      if (gold >= cost) {

        gold -= cost;

        tower.multiShot++;
        playSound("upgrade"); // ✅ ONLY HERE
      }
    };

    /* flame */

    flameBtn.onclick = () => {

      const cost = flameCost();

      if (gold < cost) return;

      gold -= cost;

      // first unlock
      if (tower.flameLevel === 0) {
        tower.flameLevel = 10;
      } else {
        tower.flameLevel++;
      }

      playSound("upgrade");
    };
    /* assistant tower */

    assistantBtn.onclick = () => {

      const cost =
        assistantCost();

      if (gold >= cost) {

        gold -= cost;

        tower.assistantLevel++;

        playSound("upgrade");
      }
    };

  </script>
</body>

</html>
